apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate-api
  labels:
    app: real-estate-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: real-estate-api
  template:
    metadata:
      labels:
        app: real-estate-api
    spec:
      containers:
        - name: api
          image: real-estate-api:1.2.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: real-estate-api
spec:
  selector:
    app: real-estate-api
  ports:
    - port: 80
      targetPort: 8000
  type: LoadBalancer
