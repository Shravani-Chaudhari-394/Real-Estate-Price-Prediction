groups:
  - name: real_estate_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(prediction_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High prediction error rate detected"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 prediction latency exceeds 500ms"

      - alert: APIDown
        expr: up{job="real-estate-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Real Estate API is down"
